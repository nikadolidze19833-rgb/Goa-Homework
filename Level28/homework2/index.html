<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <form class="subscribe-form">
        <h2>Subscribe</h2>

        <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="bobby charlton">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="bobby@.es">
        </div>

        <button>Subscribe</button>
    </form>
</div>

</body>
</html>
