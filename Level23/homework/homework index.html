<!-- 1) თქვენი სიტყვებით ახსენით რა მნიშვნელობა აქვთ შემდეგ თეგებს: header, main, footer, section, article, aside -->

<!-- <header> – გამოიყენება ვებსაიტის ან გვერდის ზედა ნაწილისთვის. აქ ჩვეულებრივ თავსდება სათაური, ლოგო, მენიუ და სხვა მნიშვნელოვანი ინფორმაცია. -->
<!-- <main> – შეიცავს გვერდის მთავარ შინაარსს. სწორედ აქ განთავსდება ის ინფორმაცია, რომლის წასაკითხადაც მომხმარებელი შემოდის საიტზე. -->
<!-- <footer> – გამოიყენება გვერდის ქვედა ნაწილისთვის. აქ ხშირად წერია ავტორის ინფორმაცია, საკონტაქტო მონაცემები, საავტორო უფლებები (Copyright) და ბმულები. -->
<!-- <section> – გამოიყენება შინაარსის თემატურ ნაწილებად დასაყოფად. მაგალითად, „ჩვენს შესახებ“, „სერვისები“ და „კონტაქტი“ შეიძლება ცალკე section-ებად იყოს დაყოფილი. -->
<!-- <article> – წარმოადგენს დამოუკიდებელ სტატიას ან ჩანაწერს. მაგალითად, ბლოგის პოსტი, სიახლე ან სტატია შეიძლება article თეგში მოთავსდეს. -->
<!-- <aside> – გამოიყენება დამატებითი ინფორმაციისთვის, რომელიც მთავარ შინაარსთან არის დაკავშირებული, მაგრამ მისი ნაწილი არ არის. მაგალითად, რეკლამები, საინტერესო ფაქტები ან გვერდითი მენიუ. -->



<!-- 2) თქვენი სიტყვებით ახსენით რა დანიშნულება აქვს div-ს -->

<!-- <div> არის კონტეინერი (ბლოკი), რომელიც გამოიყენება HTML ელემენტების ერთად დასაჯგუფებლად.
მისი მთავარი დანიშნულებაა ვებსაიტის სტრუქტურის შექმნა და ელემენტების ორგანიზება. div-ს ხშირად ვიყენებთ დიზაინის გასაკეთებლად. 


<!DOCTYPE html>
<html>
<head>
    <title>Table Example</title>
</head>
<body>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Country</th>
    </tr>

    <tr>
        <td>Harry Depp</td>
        <td>28</td>
        <td>Britain</td>
    </tr>

    <tr>
        <td>John Smith</td>
        <td>35</td>
        <td>USA</td>
    </tr>

    <tr>
        <td>Ram Krishna</td>
        <td>19</td>
        <td>Nepal</td>
    </tr>
</table>

</body>
</html>
