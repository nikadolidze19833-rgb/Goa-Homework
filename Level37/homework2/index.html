<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <div class="result-card">

        <!-- Left Section -->
        <div class="left">
            <h3>Your Result</h3>

            <div class="score-circle">
                <h1>76</h1>
                <span>of 100</span>
            </div>

            <h2>Great</h2>

            <p>
                You scored higher than 65% of the people who have taken these tests.
            </p>
        </div>

        <!-- Right Section -->
        <div class="right">

            <h2>Summary</h2>

            <div class="summary reaction">
                <span>⚡ Reaction</span>
                <strong>80 <small>/ 100</small></strong>
            </div>

            <div class="summary memory">
                <span>🧠 Memory</span>
                <strong>92 <small>/ 100</small></strong>
            </div>

            <div class="summary verbal">
                <span>💬 Verbal</span>
                <strong>61 <small>/ 100</small></strong>
            </div>

            <div class="summary visual">
                <span>👁 Visual</span>
                <strong>73 <small>/ 100</small></strong>
            </div>

            <button>Continue</button>

        </div>

    </div>

</div>

</body>
</html>
