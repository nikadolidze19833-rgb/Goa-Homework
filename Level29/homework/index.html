<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block და Inline ელემენტები</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Block და Inline ელემენტები</h1>

    <!-- Block-level ელემენტები -->
    <div class="block">DIV ელემენტი</div>

    <p class="block">P ელემენტი</p>

    <section class="block">SECTION ელემენტი</section>

    <article class="block">ARTICLE ელემენტი</article>

    <h2 class="block">H2 ელემენტი</h2>

    <hr>

    <!-- Inline-level ელემენტები -->
    <span class="inline">SPAN</span>

    <a href="#" class="inline">LINK</a>

    <strong class="inline">STRONG</strong>

    <em class="inline">EM</em>

    <img src="https://via.placeholder.com/50" alt="Image" class="inline">

</body>
</html>
